<!DOCTYPE html>
<html>
<head>
    <title>Realtime Recommendation Dashboard</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .box { border: 1px solid #ddd; padding: 10px; margin: 10px; }
        h2 { color: #333; }
    </style>
</head>
<body>

<h1>🧠 Real-Time E-Commerce Dashboard</h1>

<div class="box">
    <h2>Search Products</h2>
    <input id="query" placeholder="Search..." />
    <button onclick="search()">Search</button>
    <div id="searchResults"></div>
</div>

<div class="box">
    <h2>User Recommendations</h2>
    <input id="userId" placeholder="User ID" />
    <button onclick="getRecs()">Get</button>
    <div id="recs"></div>
</div>

<div class="box">
    <h2>Click Logger</h2>
    <button onclick="logClick()">Simulate Click</button>
</div>

<script>
async function search() {
    let q = document.getElementById("query").value;
    let res = await fetch(`/search?query=${q}`);
    let data = await res.json();

    document.getElementById("searchResults").innerHTML =
        JSON.stringify(data.results, null, 2);
}

async function getRecs() {
    let id = document.getElementById("userId").value;
    let res = await fetch(`/recommend/${id}`);
    let data = await res.json();

    document.getElementById("recs").innerHTML =
        JSON.stringify(data, null, 2);
}

async function logClick() {
    await fetch(`/log-click?user_id=1&product_id=2&event_type=click`, {
        method: "POST"
    });
    alert("Click logged!");
}
</script>

</body>
</html>
